name: ci
on:
  #push:
  #  branches:
  #    - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.head_commit.author.name != 'actions'
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Bump version and push tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
    - name: Create jar file
      run: |
        mkdir jars
        cd src
        zip -r ../jars/cip-keycloak-extensions.jar .
    - name: Saving artifacts
      uses: actions/upload-artifact@v2
      with:
        name: cip-keycloak-extensions
        path: jars/cip-keycloak-extensions.jar

  create_github_release:
    name: create github release
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - run: mkdir jars
    - name: Downloading saved artifacts
      uses: actions/download-artifact@v2
      with:
        name: cip-keycloak-extensions
    - run: mv cip-keycloak-extensions.jar jars/cip-keycloak-extensions.jar
    - name: Creating Github Release
      uses: softprops/action-gh-release@v1
      with:
        target_commitish: ${{ github.head_ref || github.ref }}
        generate_release_notes: true
        files: |
          jars/cip-keycloak-extensions.jar
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
